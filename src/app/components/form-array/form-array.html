<div class="container">
    <div class="card form-card">
        <div class="card-header bg-primary text-white py-3">
            <div class="row">
                <div class="col-6">
                    <h5 class="mb-0">Employee List</h5>
                </div>
                <div class="col-6 text-end">
                    <button class="btn btn-success">Add New</button>
                </div>
            </div>
        </div>
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>Sr No</th>
                            <th>Employee Name</th>
                            <th>Mobile</th>
                            <th>City</th>
                            <th>State</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (item of empArray(); track $index) {
                        <tr>
                            <td>{{$index}}</td>
                            <td>{{item.empName}}</td>
                            <td>{{item.mobile}}</td>
                            <td>{{item.city}}</td>
                            <td>{{item.state}}</td>
                            <td>
                                <button type="button" (click)="onEdit(item)" class="btn btn-primary btn-sm btn-sm-custom">Edit</button>
                            </td>
                        </tr>
                        }


                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="container">
    <div class="card form-card">
        <div class="card-header bg-primary text-white py-3">
            <div class="row">
                <div class="col-6">
                    <h5 class="mb-0">Employee Project Form</h5>
                </div>
                <div class="col-6 text-end">
                    <button class="btn btn-success">List</button>
                </div>
            </div>


        </div>
        <div class="card-body p-4">
            <form [formGroup]="employeeForm">
                <div class="row">
                    <div class="col-4">
                        <div class="section-title">Employee Details</div>
                    </div>
                    <div class="col-8">
                        <div class="row">
                            <div class="col-6">
                                <div class="section-title mb-0">Project Details</div>
                            </div>
                            <div class="col-6 text-end">
                                <button (click)="addProjectForm()" type="button"
                                    class="btn btn-success btn-sm btn-sm-custom">
                                    + Add Project
                                </button>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="row">
                    <div class="col-4">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Employee Name</label>
                                <input type="text" formControlName="empName" class="form-control"
                                    placeholder="Enter name" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile</label>
                                <input type="text" formControlName="mobile" class="form-control"
                                    placeholder="Enter mobile" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">City</label>
                                <input type="text" formControlName="city" class="form-control"
                                    placeholder="Enter city" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">State</label>
                                <input type="text" formControlName="state" class="form-control"
                                    placeholder="Enter state" />
                            </div>
                        </div>
                    </div>
                    <div class="col-8" formArrayName="projects">
                        <div *ngFor="let control of projectFormControlArray.controls;let index= index"
                            [formGroupName]="index" class="project-box">
                            <div class="row g-3 align-items-end">
                                <div class="col-md-4">
                                    <label class="form-label">Project Name</label>
                                    <input type="text" formControlName="projectName" class="form-control"
                                        placeholder="Project name" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Technology</label>
                                    <input type="text" class="form-control" formControlName="technology"
                                        placeholder="Technology" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Lead Name</label>
                                    <input type="text" class="form-control" formControlName="leadName"
                                        placeholder="Lead name" />
                                </div>
                                <div class="col-md-2">
                                    <button type="button" (click)="onRemove(index)"
                                        class="btn btn-outline-danger w-100 btn-sm-custom">
                                        Remove
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <hr />

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="reset" class="btn btn-light border px-4">
                        Reset
                    </button>
                    <button type="button" (click)="onSaveEmployee()" class="btn btn-primary px-4">
                        Submit
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
