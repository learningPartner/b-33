<div class="row">
    <div class="col-6">
        <div class="card">
            <div class="card-header">
                Parent Departments 
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-4">
                        <label for="">Name</label>
                        <input type="text" name="" id="">
                    </div>
                     <div class="col-4">
                        <label for="">Logo</label>
                        <input type="text" name="" id="">
                    </div>
                     <div class="col-4">
                         <button>Save Dept</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>Sr </th>
                                    <th>Name </th>
                                    <th>Logo </th> 
                                </tr>
                            </thead>
                            <tbody>
                                @for (item of parentDeptList(); track $index) {
                                      <tr>
                                    <td>{{$index+1}}</td>
                                    <td>{{item.departmentName}}</td>
                                    <td>{{item.departmentLogo}}</td>
                                </tr>
                                }
                              
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-6">
        <div class="card">
            <div class="card-header">
                Child Departments 
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-4">
                        <label for="">Parent Dept</label>
                         <select [(ngModel)]="childNewDept.parentDeptId">
                            @for (item of parentDeptList(); track $index) {
                                 <option [value]="item.departmentId"> {{item.departmentName}}</option>
                            }
                           
                         </select>
                    </div>
                     <div class="col-4">
                        <label for="">Name</label>
                        <input type="text" [(ngModel)]="childNewDept.departmentName" name="" id="">
                    </div>
                     <div class="col-4">
                         <button (click)="onSaveChildDept()">Save Dept</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <table>
                            <thead>
                                <tr>
                                    <th>Sr </th>
                                    <th>Name </th>
                                    <th>Logo </th> 
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
