<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-success">
                <div class="row">
                    <div class="col-6">
                        User List
                    </div>
                    <div class="col-6 text-end">
                        <button class="btn btn-warning" routerLink="/userform/0">Add New</button>
                    </div>
                </div>
                
            </div>
            <div class="card-body">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Sr No</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>UserName</th>
                            <th>Password</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (item of userList(); track $index) {
                        <tr>
                            <td>{{$index+1}}</td>
                            <td>{{item.fullName}}</td>
                            <td>{{item.emailId}}</td>
                            <td>{{item.userName}}</td>
                            <td>{{item.password}}</td>
                            <td>
                                <button (click)="onEdit(item.userId)" class="btn btn-success">Edit</button>
                                <button (click)="onDeleteUser(item.userId)" class="btn btn-danger mx-2">Delete</button>
                            </td>
                        </tr>
                        }

                    </tbody>
                </table>
            </div>
        </div>

    </div>
   
</div>
